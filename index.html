<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIC Simulator - Registro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100 position-relative">

    <div class="cyber-background"></div>

    <a href="admin.html" class="admin-access-btn" title="Panel de Control">
        <i class="bi bi-shield-lock-fill"></i>
    </a>

    <div class="container text-center float-animation login-container">
        <div class="logo-container mb-4">
            <h1 class="glitch display-4 fw-bold mb-0" data-text="UIC SIMULATOR">UIC SIMULATOR</h1>
        </div>
        
        <h2 class="text-white mb-2 fs-4">Gestión de Riesgos e IoMT</h2>
        <p class="subtitle text-info mb-4">Identifícate como Operador Clínico para acceder al sistema.</p>
        
        <form id="loginForm" class="form-box p-4 rounded-4 shadow-lg">
            <div class="mb-4 text-start">
                <label for="fullName" class="form-label text-cyan fw-bold">Nombre y Apellido Completo</label>
                <input type="text" id="fullName" class="form-control custom-input form-control-lg" required placeholder="Ej. Carlos Mendoza" autocomplete="off">
            </div>
            <button type="submit" id="btnIngresar" class="btn w-100 glow-button btn-lg">INICIALIZAR CONEXIÓN</button>
        </form>
        
        <div id="errorBox" class="error-box hidden mt-3 p-3 rounded-3">
            <p id="errorMessage" class="mb-0 fw-bold"></p>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
